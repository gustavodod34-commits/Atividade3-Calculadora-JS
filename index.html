<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora em js </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
        <div class="display-container">
            <div id="operation-display"></div>
            <div id="result-display"></div>
        </div>
        
        <div class="botoes">
            <button class="operador">C</button>
            <button class="operador">DEL</button>
            <button>(</button>
            <button>)</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operador">/</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operador">*</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operador">-</button>
            
            <button>0</button>
            <button>.</button>
            <button>%</button>
            <button class="operador">+</button>
            
            <button class="igual" style="grid-column: span 4;">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
